<!DOCTYPE html>
<html lang="en">
<head>
  <title>Living Lab Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

  <style>
    /* ── Welcome Screen ── */
    #welcome-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url("assets/background.jpg") center / cover no-repeat;
      font-family: Arial, sans-serif;
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }

    #welcome-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .container-box {
      max-width: 800px;
    }

    .logo {
      margin: 15px;
    }

    .enter-btn {
      padding: 15px 35px;
      font-size: 20px;
      border-radius: 40px;
      transition: transform 0.3s;
    }

    .enter-btn:hover {
      transform: scale(1.1);
    }

    .fade-in {
      animation: fadeIn 2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Dashboard ── */
    #dashboard {
      display: none;           /* hidden until welcome is dismissed */
      min-height: 100vh;
    }

    #dashboard.visible {
      display: block;
      animation: fadeIn 0.6s ease both;
    }

    /* Keep your original dashboard styles here or in css/style.css */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
    }

    .header h2 {
      margin: 0;
      font-size: 1.4rem;
    }

    .sidebar {
      background: #212529;
      color: white;
      min-height: calc(100vh - 73px); /* subtract header height */
      padding-top: 20px;
    }

    .sidebar h4 {
      color: #adb5bd;
      padding-left: 12px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .sidebar a {
      display: block;
      color: #dee2e6;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 6px;
      margin: 2px 8px;
      transition: background 0.2s;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: #343a40;
      color: #fff;
    }

    .main {
      padding: 24px;
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════
       WELCOME SCREEN
  ════════════════════════════════════ -->
  <div id="welcome-screen">
    <div class="container-box fade-in">

      <img src="assets/logo1.png" height="90" class="logo" alt="Logo 1">
      <img src="assets/logo_2.png" height="70" class="logo" alt="Logo 2">

      <h1 class="mt-3">Living Lab Project</h1>

      <p class="mt-3">
        A smart monitoring dashboard for analysing data and insights
        from the Living Lab environment.
      </p>

      <button class="btn btn-primary enter-btn mt-4" onclick="enterDashboard()">
        Enter Dashboard
      </button>

    </div>
  </div>


  <!-- ════════════════════════════════════
       DASHBOARD
  ════════════════════════════════════ -->
  <div id="dashboard">

    <div class="header">
      <img src="assets/logo1.png" height="80" alt="Logo 1">
      <img src="assets/logo_2.png" height="60" alt="Logo 2">
      <h2>Living Lab Project</h2>
    </div>

    <div class="container-fluid">
      <div class="row">

        <div class="col-2 sidebar">
          <h4>Menu</h4>
          <a href="#" class="active">Dashboard</a>
          <a href="analytics.html">Analytics</a>
          <a href="settings.html">Settings</a>
        </div>

        <div class="col-10 main">
          <h3>Dashboard</h3>
          <div id="chart"></div>
        </div>

      </div>
    </div>

  </div>


  <script>
    function enterDashboard() {
      const welcome   = document.getElementById('welcome-screen');
      const dashboard = document.getElementById('dashboard');

      // 1. Fade out the welcome screen
      welcome.classList.add('hidden');

      // 2. Show the dashboard after the CSS transition finishes (700 ms)
      setTimeout(() => {
        dashboard.classList.add('visible');
      }, 700);
    }
  </script>

  <!-- Your existing dashboard scripts -->
  <script src="js/chart.js"></script>
  <script src="js/ui.js"></script>

</body>
</html>
