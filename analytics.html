<!DOCTYPE html>

<html>

<head>

<title>Analytics</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">


<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

</head>

<body>

<div class="header">
<span class="menu-btn" onclick="toggleMenu()">☰</span>

<img src="assets/logo1.png" height="80">
<img src="assets/logo_2.png" height="60">

<h2>Living Lab Project</h2>

</div>

<div class="container-fluid">

<div class="row">

<div class="col-2 sidebar">

<h4>Menu</h4>

<a href="index.html">Dashboard</a> <a href="analytics.html">Analytics</a> <a href="settings.html">Settings</a>

</div>

<div class="col-10 main">

<h3>Analytics Map</h3>

<div class="controls">

<b>Layers</b><br>

<label><input type="checkbox" id="fieldToggle" checked> Field Data</label>

<label><input type="checkbox" id="wetlandToggle" checked> Big Wetlands</label>

<label><input type="checkbox" id="bufferToggle"> Buffer</label>

<label><input type="checkbox" id="adamasToggle" checked> Adamas Living Lab</label>

<br><br>

<b>Hover Data</b>

<select id="hoverMode" class="form-select form-select-sm" style="width:200px;">
<option value="geo">Geographical</option>
<option value="output">Output Data</option>
<option value="both">Both</option>
</select>

<br>

<b>Basemap</b>

<select id="basemap" class="form-select form-select-sm" style="width:200px;">
<option value="osm">Street</option>
<option value="satellite">Satellite</option>
<option value="terrain">Terrain</option>
</select>

</div>

<div id="map"></div>

<div class="legend">

<b>Legend</b><br>

<span style="display:inline-block;width:12px;height:12px;background:red"></span>
Field Data<br>

<span style="display:inline-block;width:12px;height:12px;background:blue"></span>
Wetlands<br>

<span style="display:inline-block;width:12px;height:12px;background:green"></span>
Buffer<br>

<span style="display:inline-block;width:12px;height:12px;background:orange"></span>
Adamas Living Lab

</div>

</div>

</div>

</div>

<footer>
© 2026 Living Lab Dashboard
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="js/map.js"></script>
<script src="js/ui.js"></script>

</body>

</html>
