<!DOCTYPE html>
<html>
<head>

<title>Living Lab Project</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
height:100vh;
margin:0;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;

/* background image */
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("assets/background.jpg");

background-size:cover;
background-position:center;
font-family:Arial;
}

.container-box{
max-width:800px;
}

.logo{
margin:15px;
}

.enter-btn{
padding:15px 35px;
font-size:20px;
border-radius:40px;
transition:0.3s;
}

.enter-btn:hover{
transform:scale(1.1);
}

.fade-in{
animation:fadeIn 2s;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container-box fade-in">

<img src="assets/logo1.png" height="90" class="logo">
<img src="assets/logo_2.png" height="70" class="logo">

<h1 class="mt-3">Living Lab Project</h1>

<p class="mt-3">
A smart monitoring dashboard for analysing data and insights
from the Living Lab environment.
</p>

<a href="index.html" class="btn btn-primary enter-btn mt-4">
Enter Dashboard
</a>

</div>

</body>
</html>
